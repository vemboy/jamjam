<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuumi's Playplace 🌷</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
      font-family: 'Nunito', sans-serif;
      color: #7a5068;
      background: linear-gradient(160deg, #ffe4f0 0%, #fdf2f8 40%, #fff8f0 100%);
      overflow: hidden;
    }

    /* soft floating blobs for a gentle backdrop */
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(60px); opacity: 0.5; z-index: 0;
    }
    .blob1 { width: 320px; height: 320px; background: #ffd0e4; top: -80px; left: -60px; }
    .blob2 { width: 260px; height: 260px; background: #fce7cf; bottom: -60px; right: -40px; }
    .blob3 { width: 200px; height: 200px; background: #e4d4ff; bottom: 20%; left: 8%; }

    .card {
      position: relative; z-index: 2;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border-radius: 26px;
      border: 1px solid rgba(255,182,210,0.4);
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      width: 100%; max-width: 520px;
      padding: 3rem 2.4rem;
      text-align: center;
    }

    .cat-badge {
      width: 116px; height: 116px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ffd8ea 0%, #f9a8c9 70%, #f386b3 100%);
      box-shadow: inset 0 2px 10px rgba(255,255,255,0.5), 0 6px 18px rgba(244,114,182,0.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.2rem;
    }

    .cat-gif {
      width: 88px; height: 88px;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      display: block;
    }

    .date {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: #d4a0b8;
      margin-bottom: 1.6rem;
    }

    .quote {
      font-family: 'Quicksand', sans-serif;
      font-weight: 600; font-size: 1.35rem; line-height: 1.55;
      color: #6b4258; letter-spacing: 0.01em;
    }

    .back {
      position: fixed; z-index: 3; bottom: 1.2rem; left: 1.2rem;
      font-size: 0.62rem; letter-spacing: 0.08em;
      color: #d4a0b8; text-decoration: none;
      border: 1.5px solid #ffd0e4; padding: 0.35rem 0.85rem; border-radius: 20px;
      transition: all 0.18s ease;
    }
    .back:hover { border-color: #f9a8c9; color: #f9a8c9; }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="card">
  <div class="cat-badge">
    <img class="cat-gif" src="cat.gif" alt="">
  </div>
  <p class="date" id="date"></p>
  <p class="quote" id="quote">You're gonna have a great rest of your day JamJam :3</p>
</div>

<a class="back" href="index.html">← back</a>

<script>
  document.getElementById('date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });
</script>

</body>
</html>
