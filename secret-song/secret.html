<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jam jammy's happy place 🏮</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; overflow: hidden;
      background: #0d0d14;
    }

    .bg {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }

    .back {
      position: fixed; z-index: 2; bottom: 1rem; left: 1rem;
      font-family: 'Nunito', sans-serif;
      font-size: 0.65rem; letter-spacing: 0.08em;
      color: #ffe4f0; text-decoration: none;
      border: 1.5px solid rgba(255,255,255,0.5);
      padding: 0.4rem 0.9rem; border-radius: 20px;
      background: rgba(10,6,14,0.25);
      transition: all 0.18s ease;
    }
    .back:hover { background: rgba(255,255,255,0.18); }
  </style>
</head>
<body>

<img class="bg" src="242e379f970c22bf30e1689290627058.gif" alt="">
<a class="back" href="../index.html">← back</a>

<audio id="song" src="Clair%20de%20Lune%20%28Extended%29.mp3" loop autoplay></audio>

<script>
  document.getElementById('song').play().catch(() => {});
</script>

</body>
</html>
